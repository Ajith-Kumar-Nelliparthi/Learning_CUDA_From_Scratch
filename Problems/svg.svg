<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="55%" stop-color="#0e1a14"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#3fd39b"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- soft glow blobs -->
  <circle cx="1040" cy="70" r="160" fill="#76b900" opacity="0.08"/>
  <circle cx="120" cy="250" r="140" fill="#3fd39b" opacity="0.06"/>

  <!-- GPU chip icon, right side -->
  <g transform="translate(940,90)" filter="url(#glow)">
    <rect x="0" y="0" width="140" height="120" rx="10" fill="#111a15" stroke="#76b900" stroke-width="2"/>
    <rect x="20" y="20" width="100" height="80" rx="4" fill="#0b0f14" stroke="#3fd39b" stroke-width="1.5"/>
    <!-- die grid -->
    <g stroke="#76b900" stroke-width="1" opacity="0.7">
      <line x1="40" y1="20" x2="40" y2="100"/>
      <line x1="60" y1="20" x2="60" y2="100"/>
      <line x1="80" y1="20" x2="80" y2="100"/>
      <line x1="100" y1="20" x2="100" y2="100"/>
      <line x1="20" y1="40" x2="120" y2="40"/>
      <line x1="20" y1="60" x2="120" y2="60"/>
      <line x1="20" y1="80" x2="120" y2="80"/>
    </g>
    <!-- pins -->
    <g stroke="#76b900" stroke-width="3">
      <line x1="0" y1="15" x2="-14" y2="15"/>
      <line x1="0" y1="35" x2="-14" y2="35"/>
      <line x1="0" y1="55" x2="-14" y2="55"/>
      <line x1="0" y1="75" x2="-14" y2="75"/>
      <line x1="0" y1="95" x2="-14" y2="95"/>
      <line x1="0" y1="105" x2="-14" y2="105"/>
      <line x1="140" y1="15" x2="154" y2="15"/>
      <line x1="140" y1="35" x2="154" y2="35"/>
      <line x1="140" y1="55" x2="154" y2="55"/>
      <line x1="140" y1="75" x2="154" y2="75"/>
      <line x1="140" y1="95" x2="154" y2="95"/>
      <line x1="140" y1="105" x2="154" y2="105"/>
      <line x1="30" y1="0" x2="30" y2="-14"/>
      <line x1="55" y1="0" x2="55" y2="-14"/>
      <line x1="80" y1="0" x2="80" y2="-14"/>
      <line x1="105" y1="0" x2="105" y2="-14"/>
      <line x1="30" y1="120" x2="30" y2="134"/>
      <line x1="55" y1="120" x2="55" y2="134"/>
      <line x1="80" y1="120" x2="80" y2="134"/>
      <line x1="105" y1="120" x2="105" y2="134"/>
    </g>
  </g>

  <!-- accent rule -->
  <rect x="80" y="96" width="64" height="6" rx="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="80" y="150" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#f2f5f2">
    100 Problems to
  </text>
  <text x="80" y="205" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#76b900">
    Learn CUDA
  </text>

  <!-- Subtitle -->
  <text x="80" y="245" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9fb0a5">
    CUDA · GPU Programming · Parallel Computing — Zero to HPC in 20 Weeks
  </text>

  <!-- bottom thin accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)"/>
</svg>
