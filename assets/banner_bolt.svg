<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a6b"/>
      <stop offset="55%" stop-color="#123f9e"/>
      <stop offset="100%" stop-color="#0a2a6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9fc2ff"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c9e6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boltGlow" x="-150%" y="-50%" width="400%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== BANNER BOX (300 tall, vertically centered in 420 canvas) ===== -->
  <g>
    <rect x="0" y="60" width="1200" height="300" fill="url(#bg)"/>
    <rect x="0" y="60" width="1200" height="300" fill="url(#grid)"/>
    <circle cx="1000" cy="130" r="150" fill="#ffffff" opacity="0.06"/>
    <circle cx="140" cy="300" r="130" fill="#9fc2ff" opacity="0.07"/>

    <!-- accent rule -->
    <rect x="80" y="156" width="64" height="6" rx="3" fill="url(#accent)"/>

    <!-- Title -->
    <text x="80" y="210" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      CUDA Learning
    </text>
    <text x="80" y="265" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      Roadmap
    </text>

    <!-- Subtitle -->
    <text x="80" y="305" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#bcd3ff">
      GPU Programming · Parallel Computing · Projects — Zero to CUDA Mastery
    </text>

    <!-- top/bottom accent lines of the banner box -->
    <rect x="0" y="60" width="1200" height="4" fill="url(#accent)"/>
    <rect x="0" y="356" width="1200" height="4" fill="url(#accent)"/>
  </g>

  <!-- ===== MONSTER CHIP (sits on the banner, right side) ===== -->
  <g transform="translate(900,150)" filter="url(#glow)">
    <rect x="0" y="0" width="150" height="130" rx="14" fill="#0d3080" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="18" y="18" width="114" height="90" rx="6" fill="#0a2a6b" stroke="#9fc2ff" stroke-width="1.5"/>
    <!-- monster eyes -->
    <circle cx="55" cy="55" r="14" fill="#ffffff"/>
    <circle cx="95" cy="55" r="14" fill="#ffffff"/>
    <circle cx="58" cy="58" r="6" fill="#123f9e"/>
    <circle cx="92" cy="58" r="6" fill="#123f9e"/>
    <!-- jagged monster mouth -->
    <path d="M40,85 L52,95 L62,85 L75,95 L88,85 L100,95 L112,85" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- little spark horns -->
    <path d="M25,0 L15,-22 L30,-10 Z" fill="#ffffff"/>
    <path d="M125,0 L135,-22 L120,-10 Z" fill="#ffffff"/>
    <!-- pins -->
    <g stroke="#ffffff" stroke-width="3">
      <line x1="0" y1="20" x2="-14" y2="20"/>
      <line x1="0" y1="45" x2="-14" y2="45"/>
      <line x1="0" y1="70" x2="-14" y2="70"/>
      <line x1="0" y1="95" x2="-14" y2="95"/>
      <line x1="0" y1="115" x2="-14" y2="115"/>
      <line x1="150" y1="20" x2="164" y2="20"/>
      <line x1="150" y1="45" x2="164" y2="45"/>
      <line x1="150" y1="70" x2="164" y2="70"/>
      <line x1="150" y1="95" x2="164" y2="95"/>
      <line x1="150" y1="115" x2="164" y2="115"/>
    </g>
  </g>

  <!-- ===== OVERSIZED LIGHTNING BOLT — strikes through banner, bursts above & below ===== -->
  <g filter="url(#boltGlow)">
    <path d="M 690 0
             L 640 140
             L 690 150
             L 610 300
             L 660 300
             L 560 420
             L 645 260
             L 600 250
             L 670 130
             L 630 120
             Z"
          fill="url(#bolt)" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- small spark particles around the bolt -->
  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="560" cy="40" r="4"/>
    <circle cx="720" cy="90" r="3"/>
    <circle cx="540" cy="330" r="4"/>
    <circle cx="710" cy="370" r="3"/>
    <circle cx="500" cy="180" r="3"/>
  </g>
</svg>
